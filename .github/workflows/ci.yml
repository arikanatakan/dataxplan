name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy dataxplan
      - name: Test
        run: pytest -q --cov=dataxplan --cov-report=term-missing

  integration:
    # Validate parsing against real PostgreSQL EXPLAIN output, in every format.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]" "psycopg[binary]>=3"
      - name: Integration tests against PostgreSQL
        env:
          DATAXPLAN_PG_DSN: "host=localhost port=5432 user=postgres password=postgres dbname=postgres"
        run: pytest tests/test_integration_pg.py -q
